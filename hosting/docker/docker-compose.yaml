version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: colanode_postgres
    restart: always
    environment:
      POSTGRES_USER: colanode_user
      POSTGRES_PASSWORD: ${COLANODE_POSTGRES_PASSWORD:?Set COLANODE_POSTGRES_PASSWORD in Dokploy environment variables}
      POSTGRES_DB: colanode_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - colanode_network

  valkey:
    image: valkey/valkey:8.1
    container_name: colanode_valkey
    restart: always
    command: ['valkey-server', '--requirepass', '${COLANODE_VALKEY_PASSWORD:?Set COLANODE_VALKEY_PASSWORD in Dokploy environment variables}']
    volumes:
      - valkey_data:/data
    networks:
      - colanode_network

  # ---------------------------------------------------------------
  # Optional MinIO Object Storage (Enable when using S3 storage)
  # ---------------------------------------------------------------
  minio:
    profiles:
      - s3
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: colanode_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: your_minio_password
      MINIO_BROWSER: 'on'
      MINIO_DOMAIN: minio
      MINIO_ADDRESS: ':9000'
      MINIO_CONSOLE_ADDRESS: ':9001'
    volumes:
      - minio_data:/data
    entrypoint: sh
    command: -c 'mkdir -p /data/colanode && minio server /data --address ":9000" --console-address ":9001"'
    networks:
      - colanode_network

  # ---------------------------------------------------------------
  # Optional SMTP Server (Mailpit) for Local Email Testing
  # ---------------------------------------------------------------
  # This service runs Mailpit, a local SMTP testing tool.
  # If you want to test how emails are sent in the 'server' service,
  # uncomment the 'smtp' service block, set email.enabled=true in config.json,
  # point the email provider to "smtp", and define EMAIL_HOST /
  # EMAIL_SMTP_USER / EMAIL_SMTP_PASSWORD env vars (and any others) so the
  # SMTP provider block in config.json resolves via env:// pointers.
  #
  # Access the Mailpit UI at http://localhost:8025
  # ---------------------------------------------------------------
  # smtp:
  #  image: axllent/mailpit:v1.24.1
  #  container_name: colanode_smtp
  #  restart: always
  #  ports:
  #    - '1025:1025' # SMTP IN (Connect server service to this port)
  #    - '8025:8025' # Web UI
  #  networks:
  #    - colanode_network

  server:
    image: ghcr.io/colanode/server:latest
    container_name: colanode_server
    restart: always
    depends_on:
      - postgres
      - valkey
      # - smtp # Optional
    environment:
      # ------------------------------------------------------------------
      # Configuration Strategy
      # ------------------------------------------------------------------
      # - All defaults live in config.json mounted at /app/apps/server/config.json
      # - config.json references secrets via env://VAR or read values from files via file://path
      # - The variables below are only those secrets; every other setting
      #   must be changed inside the JSON file
      # ------------------------------------------------------------------
      NODE_ENV: production

      # Required env:// secrets used by /config.json
      CONFIG: /dokploy-config.json
      COLANODE_WEB_DOMAIN: ${COLANODE_WEB_DOMAIN:?Set COLANODE_WEB_DOMAIN, for example colanode.example.com}
      COLANODE_CORS_ORIGIN: ${COLANODE_CORS_ORIGIN:?Set COLANODE_CORS_ORIGIN, for example https://colanode.example.com}
      POSTGRES_URL: postgres://colanode_user:${COLANODE_POSTGRES_PASSWORD:?Set COLANODE_POSTGRES_PASSWORD in Dokploy environment variables}@postgres:5432/colanode_db
      REDIS_URL: redis://:${COLANODE_VALKEY_PASSWORD:?Set COLANODE_VALKEY_PASSWORD in Dokploy environment variables}@valkey:6379/0

    expose:
      - '3000'
    volumes:
      - server_storage:/var/lib/colanode/storage
      - ./dokploy-config.json:/dokploy-config.json:ro
    networks:
      - colanode_network

  web:
    image: ghcr.io/colanode/web:latest
    container_name: colanode_web
    restart: always
    expose:
      - '80'
    networks:
      - colanode_network

volumes:
  postgres_data:
  valkey_data:
  minio_data:
  server_storage:

networks:
  colanode_network:
    driver: bridge
